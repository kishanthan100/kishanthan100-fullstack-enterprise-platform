# .github/workflows/frontend.yml

name: Frontend CI/CD

on:
  push:
    paths:
      - 'frontend/**'          # only triggers when frontend/ changes
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  # ─────────────────────────────
  # Job 1: Test
  # runs on every push and PR
  # ─────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend      # all steps run inside frontend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build check
        run: npm run build               # verifies build does not break
                                         # catches import errors, missing files

  # ─────────────────────────────
  # Job 2: Build & Push Image
  # only runs on main branch after test passes
  # ─────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                          # waits for test job to pass
    if: github.ref == 'refs/heads/main'  # only on main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatic, no setup needed

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-                  # sha-a1b2c3  ← traceable
            type=raw,value=latest                 # latest tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend             # Dockerfile inside frontend/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha            # GitHub Actions cache
          cache-to: type=gha,mode=max