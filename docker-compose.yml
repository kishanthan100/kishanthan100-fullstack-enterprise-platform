# ─────────────────────────────────────────────────────────
# PRODUCTION — /app/docker-compose.yml on your server
# Created ONCE manually — never committed to git
# Secrets live here, not in .env file
# ─────────────────────────────────────────────────────────

services:

  backend:
    image: kisha406/backend:latest
    expose:
      - "8000"
    environment:
      POSTGRES_URL
      MONGODB_URL
      MONGODB_DB_NAME
      REDIS_URL
      SECRET_KEY
      ALGORITHM
      ACCESS_TOKEN_EXPIRE_MINUTES
      ALLOWED_ORIGINS
      SECURE
      ADMIN_NAME
      ADMIN_EMAIL
      ADMIN_PASSWORD
      ADMIN_ROLE
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: kisha406/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass strongpassword
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "strongpassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge